version: '3.8'

services:
  gitnest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gitnest_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-} # Pass local machine environment variables
    restart: unless-stopped
